<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
 <h1>exemple 2 en javascript   
 <script>
// exemple amb les operacions aritmetiques basiques 



    let suma ;
    let resta ;
    let multiplicacion ; 
    let division ;

    let numero1 = prompt('intodueix el primer numero');
    let numero2 = prompt('intodueix el segon numero');

    suma = Number(numero1) + Number(numero2);
    resta = Number(numero1) - Number(numero2);
    multiplicacion = Number(numero1) * Number(numero2);
    division =  Number(numero1) / Number(numero2);

    console.log(`el resultat de la sumar ${numero1} y ${numero2} es  ${suma}`);
    console.log(`el resultat de la resta ${numero1} y ${numero2} es  ${resta}`);
    console.log(`el resultat de la multiplicacion ${numero1} y ${numero2} es  ${multiplicacion}`);
    console.log(`el resultat de la division ${numero1} entre ${numero2} es  ${division}`);

</script>



   

</body>
</html>
